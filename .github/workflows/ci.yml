name: Angular CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: my-meal-prepper/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./my-meal-prepper

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: ./my-meal-prepper

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync Angular build to S3
        run: |
          aws s3 sync ./my-meal-prepper/dist/my-meal-prepper/browser s3://my-angular-meal-planner \
            --delete \
            --acl public-read \
            --cache-control "max-age=0,no-cache,no-store,must-revalidate"